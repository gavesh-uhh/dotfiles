# ==========================
# Kitty Minimal Clean Setup
# ==========================

# Font
font_family JetBrainsMono Nerd Font
font_size 13

# Cursor
cursor_shape beam
cursor_blink_interval 0.5

# Window
window_padding_width 12
remember_window_size no

# Transparency
background_opacity 0.90
dynamic_background_opacity yes

# Remove clutter
enable_audio_bell no
confirm_os_window_close 0

# Hide KDE title bar (optional)
hide_window_decorations yes

# Tabs
tab_bar_style powerline
tab_bar_edge top
tab_bar_min_tabs 1

# Catppuccin Mocha colors
background #1e1e2e
foreground #cdd6f4

selection_background #585b70
selection_foreground #ffffff

cursor #f5e0e6

color0 #45475a
color1 #f38ba8
color2 #a6e3a1
color3 #f9e2af
color4 #89b4fa
color5 #f5c2e7
color6 #94e2d5
color7 #bac2de

color8 #585b70
color9 #f38ba8
color10 #a6e3a1
color11 #f9e2af
color12 #89b4fa
color13 #f5c2e7
color14 #94e2d5
color15 #a6adc8
